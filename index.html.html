<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Send Birthday Wish to Dubeis!</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins', sans-serif;
  background: linear-gradient(135deg,#ffd1dc,#ffeaa7,#b2fefa);
  min-height:100vh;
  overflow-y:auto;
  display:flex;
  justify-content:center;
  padding-top:20px;
}
.card{
  width:95%;
  max-width:600px;
  background: rgba(255,255,255,0.3);
  backdrop-filter:blur(12px);
  border-radius:25px;
  padding:35px 25px;
  text-align:center;
  box-shadow:0 15px 40px rgba(0,0,0,0.25);
}
h1{color:#ff69b4;margin-bottom:10px;}
h3#countdown{color:#ff4d6d;margin-bottom:20px;}
input[type="text"]{
  width:90%;
  min-height:50px;
  padding:12px;
  margin:12px auto;
  display:block;
  border-radius:20px;
  border:1px solid rgba(255,255,255,0.6);
  font-size:16px;
  text-align:center;
  color:#333;
  background: rgba(255,255,255,0.7);
  backdrop-filter:blur(5px);
}
input[type="file"]{margin-bottom:12px;}
label{font-size:14px;color:#333;}
button{
  margin-top:10px;
  padding:12px 25px;
  border:none;
  border-radius:25px;
  background:#ff69b4;
  color:white;
  font-size:16px;
  cursor:pointer;
  transition:0.3s;
}
button:hover{transform:scale(1.05);background:#ff3d6b;}
#preview img, #preview video{
  max-width:100%;
  max-height:250px;
  border-radius:12px;
  margin-top:10px;
}
#wish-container{
  margin-top:20px;
  display:flex;
  flex-direction:column;
  gap:15px;
}
.wish-box{
  background:rgba(255,255,255,0.6);
  backdrop-filter:blur(5px);
  border-radius:20px;
  padding:15px;
  text-align:left;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  position:relative;
  overflow:hidden;
}
.sender-name{
  font-weight:bold;
  color:#ff3399;
  margin-bottom:5px;
}
.textDiv{margin-bottom:8px;}
.slide-media{
  display:block;
  margin-top:10px;
  border-radius:12px;
  width:100%;
  height:auto;
  object-fit:cover;
}
footer{
  text-align:center;
  margin-top:25px;
  font-size:14px;
  color:#555;
  font-weight:500;
}
.popup{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#ff69b4;
  color:white;
  padding:10px 20px;
  border-radius:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
  opacity:0;
  transition:0.5s;
  z-index:1000;
}
.popup.show{opacity:1;}
</style>
</head>
<body>

<div class="card">
<h1>Send Birthday Wish to Dubeis 🎉</h1>
<h3 id="countdown"></h3>

<input type="text" id="wishText" placeholder="Enter your birthday wish...">
<input type="text" id="senderName" placeholder="Your name (optional)">
<label><input type="checkbox" id="anonymousCheck"> Send as Anonymous</label>
<input type="file" id="wishMedia" accept="image/*,video/*">
<div id="preview"></div>
<button onclick="sendWish()">Send Wish ❤️</button>

<h2 style="margin-top:25px;">💌 Previous Wishes 💌</h2>
<div id="wish-container"></div>

<footer>&copy; 2026 Hafiz Amsyar – FCS Student</footer>
</div>

<div class="popup" id="popup">🎉 Wish sent successfully!</div>

<script>
// Firebase init
const firebaseConfig = {
  apiKey: "AIzaSyD9PQyVhN1D-QfaVPC8NPdTdxf39mmK1mI",
  authDomain: "birthdaywishesdb.firebaseapp.com",
  databaseURL: "https://birthdaywishesdb-default-rtdb.firebaseio.com",
  projectId: "birthdaywishesdb",
  storageBucket: "birthdaywishesdb.firebasestorage.app",
  messagingSenderId: "661807517185",
  appId: "1:661807517185:web:7f9df9a0c53a022b093a00",
  measurementId: "G-MHG0PFFYZ3"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// Countdown
function updateCountdown(){
  const birthday = new Date("March 13, 2026 00:00:00").getTime();
  const now = new Date().getTime();
  const distance = birthday - now;
  const cd = document.getElementById("countdown");

  if(distance > 0){
    const days = Math.floor(distance / (1000*60*60*24));
    const hours = Math.floor((distance % (1000*60*60*24)) / (1000*60*60));
    const minutes = Math.floor((distance % (1000*60*60)) / (1000*60));
    const seconds = Math.floor((distance % (1000*60)) / 1000);
    cd.textContent = `⏳ Dubeis's Birthday : ${days}d ${hours}h ${minutes}m ${seconds}s`;
  } else {
    cd.textContent = "🎉 It’s Dubeis’s Birthday today!";
  }
}
setInterval(updateCountdown,1000);
updateCountdown();

// Preview media
const wishMedia = document.getElementById('wishMedia');
const preview = document.getElementById('preview');
wishMedia.addEventListener('change', function(){
  preview.innerHTML='';
  const file = this.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    if(file.type.startsWith('image')){
      const img = document.createElement('img');
      img.src = e.target.result;
      preview.appendChild(img);
    } else if(file.type.startsWith('video')){
      const vid = document.createElement('video');
      vid.src = e.target.result;
      vid.controls=true;
      preview.appendChild(vid);
    }
  };
  reader.readAsDataURL(file);
});

// Popup
function showPopup(msg){
  const p = document.getElementById('popup');
  p.textContent = msg;
  p.classList.add('show');
  setTimeout(()=>p.classList.remove('show'),3000);
}

// Send wish
function sendWish(){
  const text = document.getElementById('wishText').value.trim();
  const file = wishMedia.files[0];
  const nameInput = document.getElementById('senderName').value.trim();
  const anonymous = document.getElementById('anonymousCheck').checked;
  let sender = "Anonymous";
  if(!anonymous && nameInput) sender = nameInput;
  if(!text && !file){ alert("Enter wish or media!"); return; }

  if(file){
    const reader = new FileReader();
    reader.onload = function(e){
      const mediaData = e.target.result;
      db.ref('wishes').push({sender,type:file.type.startsWith('image')?'media':'video',content:mediaData,text:text||''});
      showPopup("🎉 Wish sent successfully!");
      resetForm();
    };
    reader.readAsDataURL(file);
  } else {
    db.ref('wishes').push({sender,type:'text',content:text});
    showPopup("🎉 Wish sent successfully!");
    resetForm();
  }
}

function resetForm(){
  document.getElementById('wishText').value='';
  document.getElementById('senderName').value='';
  document.getElementById('anonymousCheck').checked=false;
  wishMedia.value='';
  preview.innerHTML='';
}

// Previous wishes display (gambar/video ikut kotak penuh)
const wishContainer=document.getElementById('wish-container');
db.ref('wishes').on('child_added', snapshot => {
  const w = snapshot.val();
  const div = document.createElement('div');
  div.className='wish-box';

  if(w.sender){
    const nameDiv=document.createElement('div');
    nameDiv.className='sender-name';
    nameDiv.textContent=w.sender;
    div.appendChild(nameDiv);
  }

  if(w.type==='text' || w.type==='media' || w.type==='video'){
    if(w.type==='text'){
      const textDiv=document.createElement('div');
      textDiv.className='textDiv';
      textDiv.textContent=w.content;
      div.appendChild(textDiv);
    } else if(w.text){
      const textDiv=document.createElement('div');
      textDiv.className='textDiv';
      textDiv.textContent=w.text;
      div.appendChild(textDiv);
    }
  }

  if(w.content){
    const mediaDiv=document.createElement('div');
    div.appendChild(mediaDiv);

    if(w.type==='media' && w.content.startsWith('data:image')){
      const img=document.createElement('img');
      img.src=w.content;
      img.className='slide-media';
      img.style.width='100%';
      img.style.height='auto';
      img.style.objectFit='cover';
      mediaDiv.appendChild(img);
    } else if(w.type==='video' && w.content.startsWith('data:video')){
      const vid=document.createElement('video');
      vid.src=w.content;
      vid.controls=true;
      vid.className='slide-media';
      vid.style.width='100%';
      vid.style.height='auto';
      vid.style.objectFit='cover';
      mediaDiv.appendChild(vid);
    }
  }

  wishContainer.appendChild(div);
});
</script>
</body>
</html>
